<script>
(function () {
  'use strict';

  const CONTACT_EMAIL = 'info@cookingtherapy.de';

  const COURSES_DATA = [
    {
      id: 'pasta',
      region_key: 'course_pasta_region',
      title_key: 'course_pasta_title',
      desc_key: 'course_pasta_desc',
      duration_key: 'course_pasta_duration',
      img: 'tagliatelle_fresche',
    },
    {
      id: 'pane',
      region_key: 'course_pane_region',
      title_key: 'course_pane_title',
      desc_key: 'course_pane_desc',
      duration_key: 'course_pane_duration',
      img: 'pagnotte',
    },
    {
      id: 'pesce',
      region_key: 'course_pesce_region',
      title_key: 'course_pesce_title',
      desc_key: 'course_pesce_desc',
      duration_key: 'course_pesce_duration',
      img: 'polpo_crudo',
    },
    {
      id: 'privatchef',
      region_key: 'course_chef_region',
      title_key: 'course_chef_title',
      desc_key: 'course_chef_desc',
      duration_key: 'course_chef_duration',
      img: 'zuppa_pesce_pane',
    },
    {
      id: 'catering',
      region_key: 'course_catering_region',
      title_key: 'course_catering_title',
      desc_key: 'course_catering_desc',
      duration_key: 'course_catering_duration',
      img: 'paccheri',
    },
  ];

  const GALLERY_IMAGES = [
    'tiramisu',
    'pizza_burrata_pistacchio',
    'spaghetti_vongole',
    'zuppa_pesce_pane',
    'insalata_pomodori_carote',
    'vinete_eleganti',
    'pane_tondo',
    'olio_vinaccioli',
    'collage_melanzane',
    'pasta_nera_2',
    'polipo_gourmet',
    'paccheri',
    'insalata_polpo_patate',
    'polpo_bruschette',
    'collage_instagram_polpo',
    'manzo_carote',
    'bruschette_mousse',
    'tagliatelle_vongole',
    'polpo_insalata_mare',
  ];

  let state = {
    lang: 'de',
    active: 'hero',
    preselectedCourse: null,
    bookings: [],
    showAgenda: false,
    loadingAgenda: true,
    submitting: false,
    success: false,
  };

  function t(key) {
    return (I18N[state.lang] && I18N[state.lang][key]) || key;
  }

  function courseLabel(id) {
    const c = COURSES_DATA.find(x => x.id === id);
    return c ? t(c.title_key) : id;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str == null ? '' : String(str);
    return div.innerHTML;
  }

  /* ---------------- Storage (localStorage fallback, no server) ---------------- */
  const STORAGE_KEY = 'ct_bookings_v1';

  function loadBookingsFromStorage() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return [];
      const arr = JSON.parse(raw);
      if (Array.isArray(arr)) return arr;
      return [];
    } catch (e) {
      return [];
    }
  }

  function saveBookingsToStorage(list) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
    } catch (e) {}
  }

  function addBooking(record) {
    const list = loadBookingsFromStorage();
    list.unshift(record);
    saveBookingsToStorage(list);
    return list;
  }

  function deleteBooking(id) {
    let list = loadBookingsFromStorage();
    list = list.filter(b => b.id !== id);
    saveBookingsToStorage(list);
    return list;
  }

  /* ---------------- Rendering ---------------- */

  function render() {
    renderNav();
    renderHero();
    renderServices();
    renderAbout();
    renderCourses();
    renderGallery();
    renderBookingInfo();
    renderForm();
    renderAgenda();
    renderFooter();
    updateActiveNavHighlight();
  }

  function renderNav() {
    const items = [
      ['hero', t('nav_home')],
      ['about', t('nav_about')],
      ['courses', t('nav_courses')],
      ['gallery', t('nav_gallery')],
      ['booking', t('nav_booking')],
    ];
    const navHtml = items.map(([key, label]) =>
      `<button data-nav="${key}" class="${state.active === key ? 'active' : ''}">${escapeHtml(label)}</button>`
    ).join('');
    document.getElementById('ct-nav-desktop').innerHTML = navHtml;
    document.getElementById('ct-nav-mobile').innerHTML = items.map(([key, label]) =>
      `<button data-nav="${key}">${escapeHtml(label)}</button>`
    ).join('');

    document.querySelectorAll('[data-nav]').forEach(btn => {
      btn.addEventListener('click', () => {
        scrollToSection(btn.getAttribute('data-nav'));
        document.getElementById('ct-mobile-menu').classList.remove('open');
      });
    });

    document.querySelectorAll('.ct-lang button').forEach(btn => {
      btn.classList.toggle('active', btn.getAttribute('data-lang') === state.lang);
    });
  }

  function renderHero() {
    document.getElementById('hero-eyebrow').textContent = t('hero_eyebrow');
    document.getElementById('hero-title-1').textContent = t('hero_title_1');
    document.getElementById('hero-title-2').textContent = t('hero_title_2');
    document.getElementById('hero-lede').textContent = t('hero_lede');
    document.getElementById('hero-cta-book').textContent = t('hero_cta_book');
    document.getElementById('hero-cta-courses').textContent = t('hero_cta_courses');
    document.getElementById('hero-badge').textContent = t('hero_badge');
    document.getElementById('hero-img').src = IMAGES.maria_chefi_cutite_hero;

    const chips = [
      ['🍝', t('hero_chip_courses'), () => scrollToSection('courses')],
      ['👩‍🍳', t('hero_chip_chef'), () => bookAs('privatchef')],
      ['🍱', t('hero_chip_catering'), () => bookAs('catering')],
    ];
    const chipsEl = document.getElementById('hero-chips');
    chipsEl.innerHTML = chips.map(([icon, label], i) =>
      `<button type="button" class="ct-hero-chip" data-chip="${i}"><span>${icon}</span>${escapeHtml(label)}</button>`
    ).join('');
    chipsEl.querySelectorAll('[data-chip]').forEach((btn, i) => {
      btn.addEventListener('click', chips[i][2]);
    });
  }

  function renderServices() {
    document.getElementById('services-eyebrow').textContent = t('services_eyebrow');
    document.getElementById('services-title').textContent = t('services_title');
    document.getElementById('services-subtitle').textContent = t('services_subtitle');

    document.getElementById('service-course-title').textContent = t('service_course_title');
    document.getElementById('service-course-desc').textContent = t('service_course_desc');
    document.getElementById('service-course-cta').textContent = t('service_course_cta');

    document.getElementById('service-chef-badge').textContent = t('service_chef_badge');
    document.getElementById('service-chef-title').textContent = t('service_chef_title');
    document.getElementById('service-chef-desc').textContent = t('service_chef_desc');
    const chefCta = document.getElementById('service-chef-cta');
    chefCta.textContent = t('service_chef_cta');
    if (!chefCta.dataset.bound) {
      chefCta.addEventListener('click', () => bookAs('privatchef'));
      chefCta.dataset.bound = '1';
    }

    document.getElementById('service-catering-badge').textContent = t('service_catering_badge');
    document.getElementById('service-catering-title').textContent = t('service_catering_title');
    document.getElementById('service-catering-desc').textContent = t('service_catering_desc');
    const cateringCta = document.getElementById('service-catering-cta');
    cateringCta.textContent = t('service_catering_cta');
    if (!cateringCta.dataset.bound) {
      cateringCta.addEventListener('click', () => bookAs('catering'));
      cateringCta.dataset.bound = '1';
    }
  }

  function bookAs(courseId) {
    state.preselectedCourse = courseId;
    const sel = document.getElementById('form-course');
    if (sel) sel.value = courseId;
    updateAddressVisibility();
    scrollToSection('booking');
  }

  function renderAbout() {
    document.getElementById('about-eyebrow').textContent = t('about_eyebrow');
    document.getElementById('about-title').textContent = t('about_title');
    document.getElementById('about-p1').textContent = t('about_p1');
    document.getElementById('about-p2').textContent = t('about_p2');
    document.getElementById('about-p3').textContent = t('about_p3');
    document.getElementById('tag-puglia').textContent = t('tag_puglia');
    document.getElementById('tag-milano').textContent = t('tag_milano');
    document.getElementById('tag-tv').textContent = t('tag_tv');
    document.getElementById('about-img-1').src = IMAGES.maria_quaderno;
    document.getElementById('about-img-2').src = IMAGES.maria_selfie_divisa;
    document.getElementById('about-img-3').src = IMAGES.maria_selfie_2;
  }

  function renderCourses() {
    document.getElementById('courses-eyebrow').textContent = t('courses_eyebrow');
    document.getElementById('courses-title').textContent = t('courses_title');
    document.getElementById('courses-subtitle').textContent = t('courses_subtitle');
    document.getElementById('meat-note').textContent = t('meat_note');

    const grid = document.getElementById('courses-grid');
    grid.innerHTML = COURSES_DATA.map(c => `
      <div class="ct-course-card">
        <div class="ct-course-photo">
          <img src="${IMAGES[c.img]}" alt="${escapeHtml(t(c.title_key))}" />
          <span class="ct-course-duration">${escapeHtml(t(c.duration_key))}</span>
        </div>
        <div class="ct-course-body">
          <div class="ct-course-region">${escapeHtml(t(c.region_key))}</div>
          <h3 class="ct-display">${escapeHtml(t(c.title_key))}</h3>
          <p>${escapeHtml(t(c.desc_key))}</p>
          <div class="ct-course-meta">
            <span class="ct-course-people">${escapeHtml(t('course_people'))}</span>
            <button class="ct-course-btn" data-book-course="${c.id}">${escapeHtml(t('course_book_btn'))}</button>
          </div>
        </div>
      </div>
    `).join('');

    grid.querySelectorAll('[data-book-course]').forEach(btn => {
      btn.addEventListener('click', () => {
        state.preselectedCourse = btn.getAttribute('data-book-course');
        const sel = document.getElementById('form-course');
        if (sel) sel.value = state.preselectedCourse;
        scrollToSection('booking');
      });
    });
  }

  function renderGallery() {
    document.getElementById('gallery-eyebrow').textContent = t('gallery_eyebrow');
    document.getElementById('gallery-title').textContent = t('gallery_title');
    document.getElementById('gallery-subtitle').textContent = t('gallery_subtitle');

    const grid = document.getElementById('gallery-grid');
    grid.innerHTML = GALLERY_IMAGES.map((img, i) => `
      <div class="ct-gallery-item${i === 0 ? ' wide' : ''}" data-img="${img}">
        <img src="${IMAGES[img]}" alt="" />
      </div>
    `).join('');

    grid.querySelectorAll('[data-img]').forEach(el => {
      el.addEventListener('click', () => openLightbox(IMAGES[el.getAttribute('data-img')]));
    });
  }

  function openLightbox(src) {
    const lb = document.getElementById('ct-lightbox');
    document.getElementById('ct-lightbox-img').src = src;
    lb.style.display = 'flex';
  }
  function closeLightbox() {
    document.getElementById('ct-lightbox').style.display = 'none';
  }

  function renderBookingInfo() {
    document.getElementById('booking-eyebrow').textContent = t('booking_eyebrow');
    document.getElementById('booking-title').textContent = t('booking_title');
    document.getElementById('booking-subtitle').textContent = t('booking_subtitle');
    document.getElementById('booking-info-title').textContent = t('booking_info_title');
    document.getElementById('booking-info-p').textContent = t('booking_info_p');
    document.getElementById('info-email-label').textContent = t('info_email_label');
    document.getElementById('info-email-value').textContent = CONTACT_EMAIL;
    document.getElementById('info-location-label').textContent = t('info_location_label');
    document.getElementById('info-location-value').textContent = t('info_location_value');
    document.getElementById('info-response-label').textContent = t('info_response_label');
    document.getElementById('info-response-value').textContent = t('info_response_value');
  }

  function updateAddressVisibility() {
    const locationSel = document.getElementById('form-location');
    const courseSel = document.getElementById('form-course');
    const addressRow = document.getElementById('form-address-row');
    const show = locationSel.value === 'home' || courseSel.value === 'catering';
    addressRow.style.display = show ? '' : 'none';
  }

  function renderForm() {
    document.getElementById('form-label-name').textContent = t('form_name');
    document.getElementById('form-name').placeholder = t('form_name_ph');
    document.getElementById('form-label-email').textContent = t('form_email');
    document.getElementById('form-email').placeholder = t('form_email_ph');
    document.getElementById('form-label-phone').textContent = t('form_phone');
    document.getElementById('form-phone').placeholder = t('form_phone_ph');
    document.getElementById('form-label-people').textContent = t('form_people');
    document.getElementById('form-label-course').textContent = t('form_course');
    document.getElementById('form-label-date').textContent = t('form_date');
    document.getElementById('form-label-location').textContent = t('form_location');
    document.getElementById('form-label-address').textContent = t('form_address');
    document.getElementById('form-address').placeholder = t('form_address_ph');
    document.getElementById('form-label-message').textContent = t('form_message');
    document.getElementById('form-message').placeholder = t('form_message_ph');
    document.getElementById('form-note').textContent = t('form_note');
    document.getElementById('form-success').textContent = t('form_success');
    document.getElementById('form-success').classList.toggle('show', state.success);

    const peopleSel = document.getElementById('form-people');
    if (!peopleSel.dataset.filled) {
      peopleSel.innerHTML = Array.from({ length: 12 }, (_, i) => i + 1)
        .map(n => `<option value="${n}">${n}</option>`).join('');
      peopleSel.value = '2';
      peopleSel.dataset.filled = '1';
    }

    const courseSel = document.getElementById('form-course');
    courseSel.innerHTML = COURSES_DATA.map(c =>
      `<option value="${c.id}">${escapeHtml(t(c.title_key))}</option>`
    ).join('');
    if (state.preselectedCourse) courseSel.value = state.preselectedCourse;

    const locationSel = document.getElementById('form-location');
    const addressRow = document.getElementById('form-address-row');
    const prevLocationVal = locationSel.value || 'maria';
    locationSel.innerHTML = `
      <option value="maria">${escapeHtml(t('form_location_atmaria'))}</option>
      <option value="home">${escapeHtml(t('form_location_athome'))}</option>
    `;
    locationSel.value = prevLocationVal;
    updateAddressVisibility();
    if (!locationSel.dataset.bound) {
      locationSel.addEventListener('change', updateAddressVisibility);
      locationSel.dataset.bound = '1';
    }
    if (!courseSel.dataset.boundAddress) {
      courseSel.addEventListener('change', updateAddressVisibility);
      courseSel.dataset.boundAddress = '1';
    }

    const submitBtn = document.getElementById('form-submit-btn');
    submitBtn.textContent = state.submitting ? t('form_submitting') : t('form_submit');
    submitBtn.disabled = state.submitting;
  }

  function renderAgenda() {
    document.getElementById('agenda-toggle').textContent = state.showAgenda ? t('agenda_hide') : t('agenda_show');
    const list = document.getElementById('agenda-list');
    list.style.display = state.showAgenda ? 'flex' : 'none';

    if (!state.showAgenda) return;

    if (state.bookings.length === 0) {
      list.innerHTML = `<div class="ct-agenda-empty">${escapeHtml(t('agenda_empty'))}</div>`;
      return;
    }

    list.innerHTML = state.bookings.map(b => `
      <div class="ct-agenda-item" data-id="${escapeHtml(b.id)}">
        <div class="ct-agenda-main">
          <span class="ct-agenda-name">${escapeHtml(b.name)} &middot; ${escapeHtml(b.date)}</span>
          <span class="ct-agenda-detail">${escapeHtml(b.email)}${b.phone ? ' · ' + escapeHtml(b.phone) : ''} · ${escapeHtml(b.people)} ${escapeHtml(t('agenda_people_suffix'))}</span>
        </div>
        <span class="ct-agenda-course">${escapeHtml(b.course)}</span>
        <button class="ct-agenda-delete" data-delete="${escapeHtml(b.id)}" aria-label="delete">&times;</button>
      </div>
    `).join('');

    list.querySelectorAll('[data-delete]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.getAttribute('data-delete');
        state.bookings = deleteBooking(id);
        renderAgenda();
      });
    });
  }

  function renderFooter() {
    document.getElementById('footer-tagline').textContent = t('footer_tagline');
    document.getElementById('footer-nav-about').textContent = t('nav_about');
    document.getElementById('footer-nav-courses').textContent = t('nav_courses');
    document.getElementById('footer-nav-gallery').textContent = t('nav_gallery');
    document.getElementById('footer-nav-booking').textContent = t('nav_booking');
    document.getElementById('footer-email').textContent = CONTACT_EMAIL;
    document.getElementById('footer-email').href = 'mailto:' + CONTACT_EMAIL;
  }

  function updateActiveNavHighlight() {
    document.querySelectorAll('[data-nav]').forEach(btn => {
      btn.classList.toggle('active', btn.getAttribute('data-nav') === state.active);
    });
  }

  function scrollToSection(id) {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    state.active = id;
    updateActiveNavHighlight();
  }

  function onScroll() {
    const sections = ['hero', 'about', 'courses', 'gallery', 'booking'];
    let current = 'hero';
    for (const id of sections) {
      const el = document.getElementById(id);
      if (el && el.getBoundingClientRect().top < 140) current = id;
    }
    if (current !== state.active) {
      state.active = current;
      updateActiveNavHighlight();
    }
  }

  function handleFormSubmit(e) {
    e.preventDefault();
    const name = document.getElementById('form-name').value.trim();
    const email = document.getElementById('form-email').value.trim();
    const phone = document.getElementById('form-phone').value.trim();
    const course = document.getElementById('form-course').value;
    const people = document.getElementById('form-people').value;
    const date = document.getElementById('form-date').value;
    const locationType = document.getElementById('form-location').value;
    const address = document.getElementById('form-address').value.trim();
    const message = document.getElementById('form-message').value.trim();

    if (!name || !email || !date) return;

    state.submitting = true;
    renderForm();

    const locationLabel = locationType === 'home' ? t('form_location_athome') : t('form_location_atmaria');

    const id = 'b_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
    const record = {
      id, name, email, phone, course: courseLabel(course), people, date, message,
      locationType, address, createdAt: Date.now(),
    };

    state.bookings = addBooking(record);

    const subject = encodeURIComponent(t('email_subject_prefix') + ': ' + courseLabel(course) + ' \u2013 ' + date);
    const bodyLines = [
      t('email_field_name') + ': ' + name,
      t('email_field_email') + ': ' + email,
      phone ? t('email_field_phone') + ': ' + phone : null,
      t('email_field_course') + ': ' + courseLabel(course),
      t('email_field_people') + ': ' + people,
      t('email_field_date') + ': ' + date,
      t('email_field_location') + ': ' + locationLabel,
      ((locationType === 'home' || course === 'catering') && address) ? t('email_field_address') + ': ' + address : null,
      message ? t('email_field_message') + ': ' + message : null,
    ].filter(Boolean);
    const body = encodeURIComponent(bodyLines.join('\n'));
    const mailto = 'mailto:' + CONTACT_EMAIL + '?subject=' + subject + '&body=' + body;

    window.location.href = mailto;

    state.success = true;
    state.submitting = false;
    renderForm();
    renderAgenda();

    document.getElementById('ct-booking-form').reset();
    document.getElementById('form-people').value = '2';
    document.getElementById('form-address-row').style.display = 'none';

    setTimeout(() => {
      state.success = false;
      renderForm();
    }, 6000);
  }

  function init() {
    state.bookings = loadBookingsFromStorage();
    state.loadingAgenda = false;

    document.querySelectorAll('.ct-lang button').forEach(btn => {
      btn.addEventListener('click', () => {
        state.lang = btn.getAttribute('data-lang');
        render();
      });
    });

    document.getElementById('ct-brand-btn').addEventListener('click', () => scrollToSection('hero'));

    document.getElementById('ct-mobile-toggle').addEventListener('click', () => {
      document.getElementById('ct-mobile-menu').classList.toggle('open');
    });

    document.getElementById('ct-booking-form').addEventListener('submit', handleFormSubmit);

    document.getElementById('agenda-toggle').addEventListener('click', () => {
      state.showAgenda = !state.showAgenda;
      renderAgenda();
    });

    document.getElementById('ct-lightbox-close').addEventListener('click', closeLightbox);
    document.getElementById('ct-lightbox').addEventListener('click', (e) => {
      if (e.target.id === 'ct-lightbox') closeLightbox();
    });

    window.addEventListener('scroll', onScroll, { passive: true });

    render();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

</script>
</body>
</html>
